spring.application.name=project

# H2
# DB file name: used-market
# H2 Console JDBC URL: jdbc:h2:~/used-market
# File-based H2 creates the database file automatically on first application start.
spring.datasource.url=jdbc:h2:tcp://localhost/~/used-market
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA
# create: drop and recreate tables on every application start.
# After the schema is stable, change this to validate or update.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.properties.hibernate.use_sql_comments=true

decorator.datasource.p6spy.enable-logging=true
decorator.datasource.p6spy.multiline=true
decorator.datasource.p6spy.logging=slf4j

# SQL init is disabled because JPA creates tables from @Entity classes now.
spring.sql.init.mode=never

file.dir=C:/jinmindev/fileupload/

# Session
server.servlet.session.timeout=7d

# Orders
orders.auto-cancel.days=2