<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>상품 등록</title>
    <link th:href="@{/css/bootstrap.min.css}" href="../css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container" style="max-width: 700px">
    <div class="py-5 text-center">
        <h2>상품 등록</h2>
    </div>

    <!-- TODO: th:object, th:field, th:errors를 직접 적용해보기 -->
    <form action="/items/add" method="post">
        <div class="mb-3">
            <label for="title" class="form-label">상품명</label>
            <input type="text" id="title" name="title" class="form-control">
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">설명</label>
            <textarea id="description" name="description" class="form-control" rows="5"></textarea>
        </div>
        <div class="mb-3">
            <label for="price" class="form-label">가격</label>
            <input type="number" id="price" name="price" class="form-control">
        </div>
        <div class="mb-3">
            <label for="sellerId" class="form-label">판매자 ID</label>
            <input type="number" id="sellerId" name="sellerId" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">등록</button>
        <a href="/items" class="btn btn-secondary">취소</a>
    </form>
</div>
</body>
</html>
